# Déploie automatiquement le site sur GitHub Pages à chaque push sur main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permet aussi de lancer le déploiement à la main depuis l'onglet Actions

# Permissions nécessaires pour publier sur Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site (génère dist/)
        run: npm run build

      - name: Envoyer dist/ à GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier
        id: deployment
        uses: actions/deploy-pages@v4
